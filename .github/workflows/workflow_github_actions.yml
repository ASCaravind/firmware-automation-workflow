name: Firmware PR Validation (FW_PRN_2026_02_26_001)

on:
  pull_request:
    types: [opened, synchronize]

# Needed so the workflow can post a PR comment via the action
permissions:
  pull-requests: write

jobs:
  set-fw-id-and-annotate:
    runs-on: ubuntu-latest
    steps:
      - name: Extract FW_ID from PR title
        id: fw
        shell: bash
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          # Match FW_ followed by uppercase letters/digits/underscores and ensure at least one digit appears
          if echo "$TITLE" | grep -Eo 'FW_[A-Z0-9_]*[0-9][A-Z0-9_]*' >/dev/null; then
            FW_MATCH="$(echo "$TITLE" | grep -Eo 'FW_[A-Z0-9_]*[0-9][A-Z0-9_]*' | head -1)"
            echo "fw_id=$FW_MATCH" >> "$GITHUB_OUTPUT"
          else
            echo "fw_id=FW_PRN_2026_02_26_001" >> "$GITHUB_OUTPUT"
          fi

      - name: Print FW_ID
        run: echo "FW_ID=${{ steps.fw.outputs.fw_id }}"

      - name: Create PR comment scaffold
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: fw-validation
          message: |
            FW Validation Bootstrap
            - FW_ID: ${{ steps.fw.outputs.fw_id }}
            - TestRail Run: TR-RUN-2026-02-26-01
            - S3 Prefix: s3://firmwareerrorlogs1/${{ steps.fw.outputs.fw_id }}/